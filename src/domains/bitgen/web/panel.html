<!--
  Bitgen Webview Panel (Foxtrot‑VSCode)
  ------------------------------------
  Presents three tree‑navigators (EDA Plugins, Fuzzers, FPGA Parts) and a “Run”
  toolbar button.  Communicates with the VS Code extension via postMessage
  events and polls for run status.

  Conventions applied:
    • File header & lang attribute (accessibility)
    • CSP nonce guard (security)
    • Strict‑mode IIFE to avoid accidental globals
    • Debounced search filtering for performance
    • ARIA labels, accessible colours, outline reset
    • Tidied identifiers & numeric separators for readability
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- CSP: default none; only inline styles and the single nonce‑scoped script are allowed -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src vscode-resource: data:; script-src 'nonce-__nonce__'; style-src 'unsafe-inline';"/>
  <style>
    :root {
      --accent  : #ff7e20;
      --active  : #2cdd6e;
      --bgPanel : color-mix(in srgb, var(--vscode-sideBar-background) 75%, var(--vscode-editor-background) 25%);
      --bgCard  : var(--vscode-sideBar-background);
      --crumb   : color-mix(in srgb, var(--vscode-editor-foreground) 65%, transparent);
    }

    body {
      font-family: var(--vscode-font-family);
      padding: 8px;
      background: var(--bgPanel);
    }

    /* ── toolbar / Run button ───────────────────────────────────────── */
    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    #runBtn {
      padding: 3px 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }

    #runBtn:disabled {
      opacity: .6;
      cursor: default;
      background: var(--vscode-button-secondaryBackground);
    }

    #runBtn.spinning {
      pointer-events: none;
    }

    #runBtn.spinning::after {
      content: "";
      display: inline-block;
      margin-left: 6px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--vscode-button-foreground);
      border-radius: 50%;
      border-top-color: transparent;
      border-left-color: transparent;
      animation: spin 850ms linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── cards / lists ─────────────────────────────────────────────── */
    .section {
      background: var(--bgCard);
      padding: 6px;
      border-radius: 4px;
      box-shadow: 0 1px 1px rgb(0 0 0 / .25);
      margin-bottom: 10px;
    }

    h3 {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .search {
      width: 100%;
      box-sizing: border-box;
      padding: 3px 6px;
      margin-bottom: 6px;
      border-radius: 3px;
      border: 1px solid var(--vscode-sideBar-border);
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
      outline: none; /* reset default outline to avoid double focus ring */
    }

    .active-banner {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 2px 0 2px 3px;
      margin-bottom: 6px;
      border-left: 3px solid var(--active);
    }

    .active-label { white-space: nowrap; }
    .active-path  {
      font-size: 11px;
      color: var(--crumb);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .breadcrumb {
      font-size: 11px;
      color: var(--crumb);
      margin: 0 0 6px;
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { text-decoration: underline; }

    .item {
      padding: 3px 6px;
      cursor: pointer;
      border-radius: 3px;
    }

    .item:hover { background: var(--vscode-list-hoverBackground); }

    .item.leaf.active {
      border-left: 3px solid var(--active);
      padding-left: 3px;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button id="runBtn" disabled aria-label="Run selected fuzzer">Run ▶︎</button>
  </div>
  <div id="plugins" class="section"></div>
  <div id="fuzzers" class="section"></div>
  <div id="parts"   class="section"></div>

  <!-- All logic wrapped inside a strict‑mode IIFE to prevent accidental globals -->
  <script nonce="__nonce__">
    (function () {
      "use strict";

      /** @typedef {{label:string,path:string,children?:TreeNode[]}} TreeNode */

      const vscode = acquireVsCodeApi();
      const runBtn = document.getElementById("runBtn");

      /* ── toast helper ────────────────────────────────────────────── */
      function toast(msg, ok = true) {
        const n = document.createElement("div");
        n.textContent = msg;
        Object.assign(n.style, {
          position: "fixed",
          top: "12px",
          right: "12px",
          padding: "6px 12px",
          borderRadius: "4px",
          color: "#fff",
          fontSize: "12px",
          userSelect: "none",
          background: ok
            ? "var(--vscode-testing-iconPassedColor, #2cdd6e)"
            : "var(--vscode-testing-iconFailedColor, #f14c4c)",
          boxShadow: "0 1px 4px rgb(0 0 0 / .25)",
          zIndex: 1000,
          pointerEvents: "none",
        });
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 4_000);
      }

      /* ── polling during runs ─────────────────────────────────────── */
      let pollTimer = null;
      const startPoll = () => {
        if (!pollTimer) {
          pollTimer = setInterval(() => vscode.postMessage({ type: "poll" }), 1_500);
        }
      };
      const stopPoll = () => {
        clearInterval(pollTimer);
        pollTimer = null;
      };

      /* Pause polling when the panel is not visible (saves resources) */
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopPoll();
        } else if (runBtn.classList.contains("spinning")) {
          startPoll();
        }
      });

      /* ───────────────── Tree Navigator factory ──────────────────── */
      /**
       * @param {string} id
       * @param {string} title
       * @param {string} placeholder
       */
      function Navigator(id, title, placeholder) {
        const host = document.getElementById(id);
        host.innerHTML = `
          <h3>${title}</h3>
          <input class="search" placeholder="${placeholder}" />
          <div class="banner"></div>
          <div class="breadcrumb"></div>
          <div class="list"></div>`;

        const searchInput = /** @type {HTMLInputElement} */ (host.querySelector(".search"));
        const bannerEl    = host.querySelector(".banner");
        const breadcrumbEl = host.querySelector(".breadcrumb");
        const listEl      = host.querySelector(".list");

        /** @type {TreeNode[]} */
        let root = [];
        /** @type {Record<string, TreeNode>} */
        let nodeIndex = {};
        /** @type {string|null} */
        let active = null;
        /** @type {string[]} breadcrumb stack */
        let breadcrumbStack = [""]; // "" represents root

        function renderBanner() {
          if (!active) {
            bannerEl.innerHTML = "";
            return;
          }
          const node = nodeIndex[active];
          const label = node?.label || active.split("/").pop();
          const path = active.slice(1, -label.length - 1);
          bannerEl.innerHTML = `
            <div class="active-banner">
              <span class="active-label">${label}</span>
              <span class="active-path">${path}</span>
            </div>`;
        }

        /**
         * @param {TreeNode[]} nodes
         */
        const listHTML = (nodes) =>
          nodes
            .map((n) => {
              const cls = `item${!n.children?.length ? " leaf" : ""}${
                n.path === active ? " active" : ""
              }`;
              return `<div class="${cls}" data-path="${n.path}">${n.label}</div>`;
            })
            .join("");

        function showLevel() {
          const dir = breadcrumbStack.at(-1);
          const rows = dir === "" ? root : nodeIndex[dir].children || [];
          listEl.innerHTML = listHTML(rows);

          breadcrumbEl.innerHTML =
            breadcrumbStack.length > 1
              ? ["<span data-idx=\"0\">home</span>"]
                  .concat(
                    breadcrumbStack.slice(1).map((seg, i) => {
                      return `<span data-idx="${i + 1}"> ▸ ${seg.split("/").pop()}</span>`;
                    })
                  )
                  .join("")
              : "";

          renderBanner();
        }

        /** @param {TreeNode[]} nodes */
        function flatten(nodes) {
          return nodes.reduce((acc, n) => {
            acc[n.path] = n;
            if (n.children) Object.assign(acc, flatten(n.children));
            return acc;
          }, /** @type {Record<string, TreeNode>} */ ({}));
        }

        /**
         * @param {TreeNode[]} nodes
         * @param {string} prefix
         */
        function annotate(nodes, prefix = "") {
          return nodes.map((n) => {
            const full = n.path ?? `${prefix}/${n.label}`;
            const key = full.startsWith("/") ? full : `/${full}`;
            return {
              ...n,
              path: key,
              children: n.children ? annotate(n.children, key) : undefined,
            };
          });
        }

        /* search filter (debounced) */
        const onSearch = () => {
          const q = searchInput.value.toLowerCase();
          if (!q) {
            showLevel();
            return;
          }
          listEl.innerHTML = listHTML(
            Object.values(nodeIndex).filter(
              (n) => !n.children?.length && n.path.toLowerCase().includes(q)
            )
          );
        };

        // simple debounce
        function debounce(fn, delay) {
          let t;
          return (...args) => {
            clearTimeout(t);
            t = setTimeout(() => fn(...args), delay);
          };
        }
        searchInput.oninput = debounce(onSearch, 150);

        /* click list */
        listEl.addEventListener("click", (e) => {
          const el = /** @type {HTMLElement|null} */ (e.target.closest(".item"));
          if (!el) return;

          const node = nodeIndex[el.dataset.path];
          if (node.children?.length) {
            breadcrumbStack.push(node.path);
            showLevel();
            return;
          }

          listEl.querySelector(".active")?.classList.remove("active");
          el.classList.add("active");
          active = node.path;
          vscode.postMessage({ type: `${id}:select`, value: node.path.slice(1) });
          breadcrumbStack = [""]; // reset to root
          showLevel();
        });

        /* breadcrumb navigation */
        breadcrumbEl.addEventListener("click", (e) => {
          const span = /** @type {HTMLElement|null} */ (e.target.closest("span"));
          if (!span) return;
          breadcrumbStack = breadcrumbStack.slice(0, parseInt(span.dataset.idx, 10) + 1);
          showLevel();
        });

        return {
          /**
           * Inject fresh data from extension host
           * @param {TreeNode[]} tree
           * @param {string | undefined} activePath
           */
          setData(tree, activePath) {
            root = annotate(tree);
            nodeIndex = flatten(root);
            active = activePath ? `/${activePath}` : null;
            showLevel();
          },
        };
      }

      /* ── create navigators ───────────────────────────────────────── */
      const plugins = Navigator("plugins", "EDA Plugins", "filter plugins…");
      const fuzzers = Navigator("fuzzers", "Fuzzers", "filter fuzzers…");
      const parts   = Navigator("parts",   "FPGA Parts", "filter parts…");

      /* ── Run button handling ────────────────────────────────────── */
      runBtn.addEventListener("click", () => {
        runBtn.disabled = true;
        runBtn.classList.add("spinning");
        vscode.postMessage({ type: "fuzzer:run" });
        startPoll();
      });

      /* ── message pump from extension host ───────────────────────── */
      window.addEventListener("message", (e) => {
        const d = e.data;

        if (d.type === "run:started") {
          runBtn.disabled = true;
          runBtn.classList.add("spinning");
          startPoll();
          return;
        }
        if (d.type === "run:done") {
          stopPoll();
          runBtn.classList.remove("spinning");
          runBtn.disabled = false;
          toast(d.success ? "✔︎ Foxtrot run finished" : "✖︎ Foxtrot run failed", d.success);
          return;
        }
        if (d.type !== "data") return;

        plugins.setData(d.plugins, d.activePluginPath);
        fuzzers.setData(d.fuzzers, d.activeFuzzerPath);
        parts  .setData(d.parts,   d.activePartPath);

        if (d.inProgress) {
          runBtn.disabled = true;
          runBtn.classList.add("spinning");
          startPoll();
        } else {
          stopPoll();
          runBtn.classList.remove("spinning");
          runBtn.disabled = !d.canRun;
        }
      });

      /* initial handshake */
      vscode.postMessage({ type: "init" });
    })();
  </script>
</body>
</html>
